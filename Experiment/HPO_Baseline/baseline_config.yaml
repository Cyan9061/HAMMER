# Baseline实验配置 - 与MCTS/TPE兼容的简化版本

name: "baseline-2wikimultihopqa"

dataset:
  description: "2WikiMultiHopQA多跳推理数据集，用于baseline对比实验"
  load_examples_timeout_s: 1800
  load_grounding_data_timeout_s: 1800
  partition_map:
    holdout: test
    sample: test  
    test: test
    train: test
  storage_partitions:
  - test
  xname: hotpotqa_hf  # 使用支持的数据集标识

evaluation:
  llms:
  - together-llama-small
  min_reporting_success_rate: 0.3
  mode: random
  raise_on_exception: false
  use_tracing_metrics: false

optimization:
  sampler: tpe  # 使用标准TPE
  num_trials: 50
  num_eval_samples: 283  # 与MCTS训练集大小一致
  skip_existing: true
  use_cost_pruner: false
  use_pareto_pruner: false
  objective_1_name: accuracy  # 使用支持的目标
  objective_2_name: llm_cost_mean  # 使用支持的目标
  max_eval_failure_rate: 0.8
  max_trial_cost: 10.0
  embedding_device: cuda
  max_concurrent_trials: 1
  
  # 基线配置
  baselines: []
  baselines_cycle_llms: false
  blocks:
  - components:
    - rag_retriever
    - splitter
    - additional_context
    - few_shot_retriever
    # - hyde  # 🔥 移除HyDE组件
    - reranker
    - rag_mode
    - response_synthesizer_llm
    - template_name
    name: global
    num_trials: 50

search_space:
  # 固定为RAG模式
  rag_modes: ["rag"]
  
  # 响应合成LLM
  response_synthesizer_llms: 
    - "together-llama-small"
  
  # 提示模板
  template_names:
    - "default"
    - "concise"
    - "CoT"
  
  # RAG检索器配置
  rag_retriever:
    top_k:
      kmin: 3
      kmax: 20
      log: false
      step: 2
    methods: ["dense", "sparse", "hybrid"]
    embedding_models:
      - "/mnt/data/wangshu/llm_lm/bge-m3"
      - "/mnt/data/yingli/bge-large-en-v1.5"
    query_decomposition_enabled: [true, false]
    
    # 混合检索权重
    hybrid:
      bm25_weight_min: 0.1
      bm25_weight_max: 0.9
      bm25_weight_step: 0.1
    
    # 融合模式
    fusion:
      fusion_modes: 
        - "simple"
        - "reciprocal_rerank"
        - "relative_score"
    
    # 查询分解配置  
    query_decomposition:
      llm_names:
        - together-llama-small
      num_queries_min: 2
      num_queries_max: 5
      num_queries_step: 1
  
  # 文本分割器配置
  splitter:
    chunk_min_exp: 6
    chunk_max_exp: 12
    chunk_overlap_frac_min: 0.0
    chunk_overlap_frac_max: 0.5
    chunk_overlap_frac_step: 0.1
    methods: ["recursive", "sentence", "token"]
  
  # HyDE配置（🔥 强制关闭以减少搜索空间）
  hyde_enabled: [false]  # 原值: [true, false]
  # hyde:
  #   llms:
  #     - together-llama-small
  
  # 重排序配置
  reranker_enabled: [true, false]
  reranker:
    llms:
      - together-llama-small
    top_k:
      kmax: 15
      kmin: 2
      log: false
      step: 1
  
  # 额外上下文
  additional_context_enabled: [true, false]
  additional_context:
    num_nodes_max: 10
    num_nodes_min: 1
  
  # Few-shot（禁用以简化）
  few_shot_enabled: [false]
  few_shot_retriever:
    embedding_models:
      - "/mnt/data/wangshu/llm_lm/bge-m3"
    top_k:
      kmax: 5
      kmin: 1
      log: false
      step: 1

# 基本配置
pareto: null
recreate_study: true
reuse_study: false
toy_mode: false

# 超时设置
timeouts:
  embedding_max_time: 3600
  embedding_min_chunks_to_process: 10
  embedding_min_time_to_process: 30
  embedding_timeout_active: true
  eval_timeout: 1800
  onnx_timeout: 300
  single_eval_timeout: 1000

transfer_learning:
  embedding_model: /mnt/data/wangshu/llm_lm/bge-m3
  max_fronts: 1
  max_total: 50
  studies: []
  success_rate: 0.5